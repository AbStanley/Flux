services:
  web:
    image: abstanley/flux-web:latest
    ports:
      - "8081:80"
    restart: always
    networks:
      - app-network

  server:
    image: abstanley/flux-server:latest
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flux_db
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-temporary_secret_change_me} # Default value if .env is missing
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=flux_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app-network

  caddy:
    image: abstanley/flux-caddy:latest # Using your custom image
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - caddy_data_prod:/data
    depends_on:
      - server
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data_prod:
  caddy_data_prod: